<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111110;--bg2:#171714;--bg3:#1e1e1a;--bg4:#252520;
  --border:#2a2a25;--border2:#333330;
  --text:#e8e6e0;--text2:#c8c6be;--text3:#666660;
  --accent:#c8b89a;--accent2:#b0a08a;--accent3:#8aaa8a;--accent-dim:#2a261e;
  --orange:#df7040;
  --lv1:#7ab898;--lv2:#c8a060;--lv3:#c07070;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
#app{max-width:1100px;margin:0 auto;padding:40px 24px 60px}

/* Header */
header{padding-bottom:28px;border-bottom:1px solid var(--border);margin-bottom:28px}
.eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;font-family:'Segoe UI',system-ui,sans-serif}
h1{font-size:28px;font-weight:400;font-family:'Georgia',serif;color:var(--text);line-height:1.2;margin-bottom:8px}
h1 em{font-style:italic;color:var(--orange);font-weight:400}
.subtitle{font-size:13px;color:var(--text3);font-style:italic;margin-bottom:20px}
.stats-row{display:flex;gap:32px;flex-wrap:wrap}
.stat-n{font-size:22px;font-weight:700;color:var(--text);font-family:'Georgia',serif;line-height:1}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:nowrap;margin-bottom:14px;align-items:center}
.sw{flex:1;min-width:0;position:relative}
.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:0 12px 0 36px;font-size:13px;font-family:'Segoe UI',system-ui,sans-serif;outline:none;height:40px;transition:border .15s}
input[type=text]:focus{border-color:var(--accent2)}
input[type=text]::placeholder{color:var(--text3)}
.lang-toggle{display:flex;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden;height:40px;flex-shrink:0}
.lang-btn{padding:0 16px;font-size:12px;font-weight:700;font-family:'Segoe UI',system-ui,sans-serif;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;letter-spacing:.06em;height:40px}
.lang-btn.on{background:var(--bg3);color:var(--accent)}

/* Filters */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.filter-label{font-family:'Segoe UI',system-ui,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--text3);margin-right:4px}
.lvl-pill{font-family:'Segoe UI',system-ui,sans-serif;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--border2);color:var(--text3);background:transparent}
.lvl-pill:hover{color:var(--text2)}
.lvl-pill.on{color:var(--text);border-color:var(--border2);background:var(--bg3)}
.cat-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.cat-pill{font-family:'Segoe UI',system-ui,sans-serif;padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .15s;border:1px solid transparent;color:var(--text3);background:transparent}
.cat-pill:hover{color:var(--text2)}
.cat-pill.on{color:var(--text);border-color:var(--border2);background:var(--bg3)}
.info-row{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;color:var(--text3);margin-bottom:12px}

/* Grid — separated by 1px lines like a table */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border)}
.card{background:var(--bg);padding:18px 20px;cursor:pointer;transition:background .12s;position:relative}
.card:hover{background:var(--bg2)}
.card.open{background:var(--bg2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.term{font-size:14px;font-weight:700;color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.3}
.chevron{color:var(--text3);flex-shrink:0;transition:transform .2s;margin-top:2px}
.meta{display:flex;align-items:center;gap:8px;margin-top:5px}
.cat-label{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;color:var(--text3)}
.lbadge{font-family:'Segoe UI',system-ui,sans-serif;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.08em;text-transform:uppercase}
.lv1b{color:var(--lv1);border:1px solid var(--lv1);background:transparent}
.lv2b{color:var(--lv2);border:1px solid var(--lv2);background:transparent}
.lv3b{color:var(--lv3);border:1px solid var(--lv3);background:transparent}
.def{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:var(--text2);margin-top:10px;line-height:1.7}
.detail{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none}
.card.open .detail{display:block}
.dlabel{font-family:'Segoe UI',system-ui,sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:5px}
.usecase{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:var(--accent3);line-height:1.7;font-style:italic}
.empty{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="eyebrow">PLANPEACEPLEASE · TOOLS</div>
  <h1>IT Vocab for <em>Non-Tech People</em></h1>
  <div class="subtitle">Bring peace to your tech journey.</div>
  <div class="stats-row" id="stats"></div>
</header>

<div class="controls">
  <div class="sw">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search terms and definitions…">
  </div>
  <div class="lang-toggle">
    <button class="lang-btn on" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-th" onclick="setLang('th')">TH</button>
  </div>
</div>

<div class="filter-row">
  <span class="filter-label">Level</span>
  <button class="lvl-pill on" data-lv="1" onclick="toggleLv(1)">Beginner</button>
  <button class="lvl-pill on" data-lv="2" onclick="toggleLv(2)">Workplace</button>
  <button class="lvl-pill on" data-lv="3" onclick="toggleLv(3)">Advanced</button>
</div>

<div class="cat-bar" id="cat-bar"></div>
<div class="info-row" id="info-row"></div>
<div class="vocab-grid" id="grid"></div>
</div>

  "DevOps & Deployment":{color:"#60a5fa",e:"\ud83d\ude80"},"Agile & Dev Process":{color:"#fb923c",e:"\ud83d\udccb"}

ata Breach"},"SSO (Single Sign-On)":{d:"ระบบที่ให้คุณล็อกอินแอปหลายตัวด้วยข้อมูลรับรองชุดเดียว",u:"'ล็อกอินด้วย Google' บนเว็บไซต์ต่างๆ คือการใช้ SSO"},"OAuth":{d:"มาตรฐานเปิดที่ให้แอปขอสิทธิ์เข้าถึงบัญชีของคุณอย่างจำกัดโดยไม่ต้องเห็นพาสเวิร์ด",u:"การให้แอปตารางงานอ่าน Google Calendar ของคุณใช้ OAuth"},"Token":{d:"กุญแจดิจิทัลชั่วคราวที่ออกหลังล็อกอินเพื่อพิสูจน์ตัวตนกับระบบ",u:"หลังล็อกอิน แอปบันทึก Token ไว้เพื่อไม่ต้องพิมพ์พาสเวิร์ดใหม่ทุกครั้ง"},"Penetration Testing":{d:"การแฮกที่ได้รับอนุญาต — ผู้เชี่ยวชาญด้านความปลอดภัยพยายามเจาะระบบเพื่อหาจุดอ่อนก่อนผู้ไม่หวังดี",u:"ก่อนเปิดตัวแอปธนาคาร จะมีการทำ Pen Test เพื่อหาช่องโหว่"},"Zero-Day":{d:"ช่องโหว่ด้านความปลอดภัยที่ผู้ผลิตซอฟต์แวร์ยังไม่รู้ ทำให้ไม่มีเวลาแก้ไขเลย",u:"ผู้โจมตีใช้ Zero-Day ก่อนที่แพตช์จะมี ทำให้อันตรายมาก"},"API":{d:"Application Programming Interface — วิธีที่กำหนดไว้สำหรับให้สองระบบคุยกันและแลกเปลี่ยนข้อมูล",u:"เมื่อแอปท่องเที่ยวแสดงราคาตั๋วสดๆ แสดงว่ามันเรียก API ของสายการบิน"},"Endpoint":{d:"URL เฉพาะที่ API รับคำขอ",u:"'/api/users/123' คือ Endpoint ที่คืนข้อมูลของผู้ใช้หมายเลข 123"},"Request / Response":{d:"Request คือการขอข้อมูลจาก API ส่วน Response คือสิ่งที่ส่งกลับมา",u:"แอปของคุณขอข้อมูลสภาพอากาศ API สภาพอากาศตอบกลับด้วยอุณหภูมิและพยากรณ์"},"REST API":{d:"รูปแบบ API ที่พบบ่อยที่สุด — ใช้เมธอดเว็บมาตรฐาน (GET, POST, PUT, DELETE) จัดการข้อมูล",u:"แอปมือถือเกือบทุกตัวใช้ REST API ในการดึงและส่งข้อมูลไปยังเซิร์ฟเวอร์"},"GET / POST / PUT / DELETE":{d:"เมธอด HTTP มาตรฐาน: GET = อ่านข้อมูล, POST = สร้าง, PUT = อัปเดต, DELETE = ลบ",u:"เมื่อกรอกฟอร์มและส่ง เบราว์เซอร์จะส่ง POST Request พร้อมข้อมูลของคุณ"},"JSON":{d:"JavaScript Object Notation — รูปแบบข้อความเบาๆ สำหรับส่งข้อมูลที่มีโครงสร้างระหว่างระบบ",u:"ผลลัพธ์จาก API ที่มีรายละเอียดผู้ใช้จะกลับมาเป็น JSON"},"Webhook":{d:"ข้อความอัตโนมัติที่ระบบหนึ่งส่งไปยังอีกระบบเมื่อเหตุการณ์เฉพาะเกิดขึ้น",u:"เมื่อการชำระเงินสำเร็จ Payment Gateway จะส่ง Webhook ไปยังเซิร์ฟเวอร์เพื่ออัปเดตสถานะออร์เดอร์"},"API Key":{d:"รหัสเฉพาะที่ใช้ระบุและยืนยันตัวตนผู้ที่เ :"แทนที่จะเรียกฐานข้อมูลทุกครั้ง รายละเอียดสินค้าจะถูก Cache ไว้ 5 นาที"},"Queue / Message Queue":{d:"บัฟเฟอร์ที่เก็บงานรอประมวลผลทีละงาน เพื่อแยกระบบออกจากกัน",u:"อีเมลออร์เดอร์ถูกใส่ใน Queue เพื่อส่งได้อย่างน่าเชื่อถือแม้ Email Service จะช้า"},"Event-Driven":{d:"สถาปัตยกรรมที่การกระทำถูกเรียกใช้โดยเหตุการณ์ ไม่ใช่การเรียกตรงระหว่างบริการ",u:"เมื่อออร์เดอร์ถูกสร้าง (Event) ทั้ง Inventory Service และ Email Service ตอบสนองต่างหาก"},"Latency":{d:"ความล่าช้าระหว่างการกระทำกับผลลัพธ์ — วัดเป็นมิลลิวินาที",u:"Latency สูงทำให้แอปรู้สึกเชื่องช้า ผู้ใช้รอนานเกินไปกว่าหน้าจะตอบสนอง"},"Throughput":{d:"จำนวนการดำเนินการที่ระบบรองรับได้ต่อหน่วยเวลา",u:"ระบบชำระเงินที่มี Throughput สูงประมวลผลธุรกรรมได้หลายพันรายการต่อวินาที"},"Redundancy":{d:"การมีระบบหรือองค์ประกอบสำรองเพื่อไม่ให้ทุกอย่างล่มเมื่อส่วนหนึ่งเสีย",u:"การเก็บข้อมูลใน 2 Data Center คือ Redundancy — ถ้าตัวหนึ่งล้ม อีกตัวจะรับช่วง"},"Database":{d:"คอลเลกชันข้อมูลที่จัดระเบียบซึ่งสามารถจัดเก็บ ค้นหา และอัปเดตได้อย่างมีประสิทธิภาพ",u:"ทุกครั้งที่คุณค้นหาบน Amazon มันจะ Query ฐานข้อมูลสินค้าขนาดใหญ่"},"SQL":{d:"Structured Query Language — ภาษามาตรฐานสำหรับสื่อสารกับฐานข้อมูลเชิงสัมพันธ์",u:"นักพัฒนาเขียน SQL เพื่อดึงออร์เดอร์ทั้งหมดใน 30 วันที่ผ่านมาจากฐานข้อมูล"},"Query":{d:"คำถามหรือคำขอที่ส่งไปยังฐานข้อมูลเพื่อดึงหรือจัดการข้อมูล",u:"'แสดงผู้ใช้ทั้งหมดที่สมัครเดือนนี้' คือ Database Query"},"Table":{d:"ข้อมูลที่จัดระเบียบในแถวและคอลัมน์ภายในฐานข้อมูล — เหมือน Spreadsheet",u:"ตาราง 'users' อาจมีคอลัมน์สำหรับ ID ชื่อ อีเมล และวันที่สมัคร"},"Primary Key":{d:"ตัวระบุเฉพาะสำหรับแต่ละแถวในตารางฐานข้อมูล",u:"ลูกค้าแต่ละรายมี customer_id เฉพาะที่ทำหน้าที่เป็น Primary Key"},"Foreign Key":{d:"ฟิลด์ในตารางหนึ่งที่เชื่อมโยงไปยัง Primary Key ของอีกตารางเพื่อเชื่อมข้อมูล",u:"ตาราง 'orders' มี customer_id เป็น Foreign Key เชื่อมออร์เดอร์แต่ละรายการกับลูกค้า"},"Schema":{d:"พิมพ์เขียวของฐานข้อมูล — มีตารางอะไรบ้าง คอลัมน์ และประเภทข้อมูล",u:"ก่อนสร้างฟีเจอร์ ทีมออกแบบ Schema เพื่อวางแผนว่าจะเก็บข้อมูลอะไรและอย่างไร"},"Index":{d:"โครงสร้างข้อมูลที่เร่งการค้นหาในฐานข้อมูล เหมือนดัชนีหนังสือ",u:"การเพิ่ม Index ในคอลัมน์ 'email' ทำให้ Query การล็อกอินเร็วขึ้นมาก"},"NoSQL":{d:"หมวดฐานข้อมูลที่เก็บข้อมูลในรูปแบบยืดหยุ่น (เอกสาร คู่คีย์-ค่า) แทนตาราง",u:"MongoDB คือฐานข้อมูล NoSQL ที่ใช้เมื่อโครงสร้างข้อมูลแตกต่างกันในแต่ละเรคอร์ด"},"CRUD":{d:"Create, Read, Update, Delete — สี่การดำเนินการพื้นฐานสำหรับจัดการข้อมูล",u:"แอป To-Do ให้คุณสร้างงาน อ่าน อัปเดตสถานะ และลบ นั่นคือ CRUD"},"Migration":{d:"การเปลี่ยนแปลง Database Schema ที่ควบคุมและมีเวอร์ชัน",u:"การเพิ่มคอลัมน์ 'phone_number' ในตาราง users ต้องเขียน Migration"},"ORM":{d:"Object Relational Mapper — เครื่องมือที่ให้นักพัฒนาทำงานกับฐานข้อมูลโดยใช้โค้ดแทน SQL ดิบ",u:"ด้วย ORM นักพัฒนาเขียน 'User.find(1)' แทน 'SELECT * FROM users WHERE id=1'"},"Transaction":{d:"ลำดับการดำเนินการฐานข้อมูลที่ถือเป็นหน่วยเดียว — ทั้งหมดสำเร็จหรือล้มเหลวพร้อมกัน",u:"การโอนเงินหักจากบัญชีหนึ่งและเพิ่มอีกบัญชี — ทั้งคู่ต้องสำเร็จหรือไม่มีอะไรเกิดขึ้น"},"Deployment":{d:"กระบวนการปล่อยการเปลี่ยนแปลงโค้ดสู่สภาพแวดล้อมจริงที่ผู้ใช้เข้าถึงได้",u:"หลัง Sprint สิ้นสุด ทีม Deploy ฟีเจอร์ใหม่สู่ Production"},"Environment":{d:"อินสแตนซ์แยกของระบบ — โดยทั่วไปคือ Dev, Staging และ Production",u:"การทดสอบบน Staging ก่อน Deploy สู่ Production ป้องกันบั๊กไม่ให้ถึงผู้ใช้"},"Production":{d:"ระบบจริงที่ผู้ใช้จริงกำลังใช้งานอยู่ในขณะนี้",u:"อย่าทดสอบฟีเจอร์ที่ยังไม่ผ่านการทดสอบใน Production โดยตรง"},"Staging":{d:"สภาพแวดล้อมก่อน Production ที่จำลอง Production สำหรับการทดสอบขั้นสุดท้าย",u:"QA ทดสอบ Release บน Staging ก่อนที่จะ Go Live"},"CI/CD":{d:"Continuous Integration / Continuous Delivery — การทำให้กระบวนการทดสอบและ Deploy โค้ดเป็นอัตโนมัติ",u:"ด้วย CI/CD ทุก Code Commit จะถูกทดสอบและ Deploy อัตโนมัติ"},"Pipeline":{d:"ลำดับขั้นตอนอัตโนมัติที่โค้ดผ่าน — Build, Test, Deploy",u:"Pipeline รัน Unit Tests, Integration Tests แล้ว Deploy ถ้าทั้งหมดผ่าน"},"Container":{d:"แพ็กเกจที่เบาและพกพาได้ซึ่งรวมแอปและทุกสิ่งที่ต้องการเพื่อรันได้ทุกที่",u:"Docker Container ทำให้แอปรันเหมือนกันบน Laptop นักพัฒนา let activeLv=new Set([1,2,3]),activeCat='All',searchQ='',openTerm=null,lang='en';

function all(){return VOCAB;}

function filtered(){
  let v=all();
  v=v.filter(x=>activeLv.has(x.lv));
  if(activeCat!=='All')v=v.filter(x=>x.c===activeCat);
  if(searchQ){const q=searchQ.toLowerCase();v=v.filter(x=>x.t.toLowerCase().includes(q)||x.d.toLowerCase().includes(q));}
  return v;
}

function renderStats(){
  const v=all();
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${v.length}</div><div class="stat-l">Terms</div></div>
    <div class="stat"><div class="stat-n">${Object.keys(CATS).length}</div><div class="stat-l">Categories</div></div>
    <div class="stat"><div class="stat-n">0</div><div class="stat-l">Added by you</div></div>
  `;
}

function renderCats(){
  const counts={};all().filter(x=>activeLv.has(x.lv)).forEach(x=>{counts[x.c]=(counts[x.c]||0)+1;});
  const total=all().filter(x=>activeLv.has(x.lv)).length;
  let h=`<button class="cat-pill${activeCat==='All'?' on':''}" onclick="setCat('All')">All (${total})</button>`;
  Object.entries(CATS).forEach(([n,m])=>{
    const cnt=counts[n]||0;if(!cnt)return;
    const on=activeCat===n;
    h+=`<button class="cat-pill${on?' on':''}" onclick="setCat('${n}')">${n} (${cnt})</button>`;
  });
  document.getElementById('cat-bar').innerHTML=h;
}

function lvLabel(lv){return lv===1?'<span class="lbadge lv1b">Beginner</span>':lv===2?'<span class="lbadge lv2b">Workplace</span>':'<span class="lbadge lv3b">Advanced</span>';}

function getDesc(item){return lang==='th'&&THAI[item.t]?THAI[item.t].d:item.d;}
function getUse(item){return lang==='th'&&THAI[item.t]?THAI[item.t].u||'':item.u||'';}

function setLang(l){
  lang=l;
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  document.getElementById('btn-th').classList.toggle('on',l==='th');
  renderGrid();
}

function renderGrid(){
  const v=filtered();
  document.getElementById('info-row').textContent=`Showing ${v.length} term${v.length!==1?'s':''}`;
  if(!v.length){
    document.getElementById('grid').innerHTML=`<div class="empty"><div style="font-size:32px;opacity:.2;margin-bottom:10px">🔍</div><div style="color:var(--text3);font-size:14px">No terms match your filters.</div></div>`;
    return;
  }
  const thFont=lang==='th'?'font-family:"Segoe UI",Tahoma,sans-serif;line-height:1.8;':'';
  document.getElementById('grid').innerHTML=v.map(item=>{
    const cat=CATS[item.c]||{color:'#94a3b8'};
    const isOpen=openTerm===item.t;
    const desc=getDesc(item);
    const use=getUse(item);
    return `<div class="card${isOpen?' open':''}" data-term="${item.t.replace(/"/g,'&quot;')}" onclick="toggleCard(this.dataset.term)">
      <div class="card-top">
        <div class="term">${item.t}</div>
        <svg class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:rotate(${isOpen?180:0}deg)"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="meta">
        <span class="cat-label">${item.c}</span>
        ${lvLabel(item.lv)}
      </div>
      <div class="def" style="${thFont}">${desc}</div>
      ${isOpen&&use?`<div class="detail"><div class="dlabel">💡 Use Case</div><div class="usecase" style="${thFont}">${use}</div></div>`:''}
    </div>`;
  }).join('');
}

function toggleCard(term){openTerm=openTerm===term?null:term;renderGrid();}
function setCat(c){activeCat=c;openTerm=null;renderCats();renderGrid();}
function toggleLv(lv){
  if(activeLv.has(lv)){if(activeLv.size>1)activeLv.delete(lv);}else activeLv.add(lv);
  document.querySelectorAll('[data-lv]').forEach(b=>{b.classList.toggle('on',activeLv.has(parseInt(b.dataset.lv)));});
  openTerm=null;renderCats();renderGrid();
}

document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.trim();openTerm=null;renderGrid();});
renderStats();renderCats();renderGrid();
</script>
</body>
</html>
