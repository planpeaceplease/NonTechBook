<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --n9:#111110;--n8:#171714;--n7:#1e1e1a;--n6:#252520;
  --accent:#c8b89a;--accent2:#b0a08a;--accent3:#8aaa8a;--accent-dim:#2a261e;
  --orange:#df7040;
  --tp:#e8e6e0;--ts:#c8c6be;--tm:#888880;
  --bd:#2a2a25;--bdl:#3a3a34;
  --lv1:#7ab898;--lv2:#c8a060;--lv3:#c07070;
}
body{background:var(--n9);color:var(--tp);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
#app{max-width:1020px;margin:0 auto;padding:20px 14px 40px}
header{padding:28px 0 22px;border-bottom:1px solid var(--bd);margin-bottom:18px}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--accent-dim);border:1px solid var(--bdl);display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700}
h1{font-size:22px;font-weight:800;color:var(--tp);line-height:1.2}
h1 em{font-style:italic;color:var(--orange)}
.stats-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.stat{background:var(--n7);border:1px solid var(--bd);border-radius:8px;padding:7px 14px;text-align:center;min-width:80px}
.stat-n{font-size:17px;font-weight:800;color:var(--accent)}
.stat-l{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.controls{display:flex;gap:8px;flex-wrap:nowrap;margin-bottom:12px;align-items:center}
.sw{flex:1;min-width:180px;position:relative}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--tm)}
input[type=text]{width:100%;background:var(--n7);border:1px solid var(--bdl);border-radius:9px;color:var(--tp);padding:0 10px 0 34px;font-size:13px;outline:none;height:40px;transition:border .15s}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--tm)}
.btn{background:var(--n7);border:1px solid var(--bdl);color:var(--ts);padding:9px 13px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;align-self:center}
.btn:hover{background:var(--n6);border-color:var(--accent);color:var(--tp)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.lang-toggle{display:flex;background:var(--n7);border:1px solid var(--bdl);border-radius:9px;overflow:hidden;height:40px;align-self:center}
.lang-btn{padding:0 14px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--ts);transition:all .15s;letter-spacing:.05em;height:40px}
.lang-btn.on{background:var(--accent);color:#fff}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--tm);font-weight:700;margin-right:4px}
.lvl-pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid transparent;opacity:.55}
.lvl-pill:hover,.lvl-pill.on{opacity:1}
.lvl-1{border-color:var(--lv1);color:var(--lv1)}.lvl-1.on{background:var(--lv1);color:#0d2624}
.lvl-2{border-color:var(--lv2);color:var(--lv2)}.lvl-2.on{background:var(--lv2);color:#2a1f00}
.lvl-3{border-color:var(--lv3);color:var(--lv3)}.lvl-3.on{background:var(--lv3);color:#2a0000}
.cat-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-pill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid transparent;opacity:.6}
.cat-pill:hover,.cat-pill.on{opacity:1}
.info-row{font-size:11px;color:var(--tm);margin-bottom:10px}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:10px}
.card{background:var(--n8);border:1px solid var(--bd);border-radius:11px;padding:14px;cursor:pointer;transition:border-color .15s,transform .15s;position:relative}
.card:hover{border-color:var(--bdl);transform:translateY(-1px)}
.card.open{border-color:var(--accent2);background:var(--n7)}
.ct{display:flex;align-items:flex-start;gap:9px}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.term{font-size:14px;font-weight:800;color:var(--tp);line-height:1.3}
.ctag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-top:2px}
.lbadge{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.lv1b{background:#7ab89811;color:var(--lv1);border:1px solid var(--lv1)}
.lv2b{background:#c8a06011;color:var(--lv2);border:1px solid var(--lv2)}
.lv3b{background:#c0707011;color:var(--lv3);border:1px solid var(--lv3)}
.def{font-size:12px;color:var(--ts);margin-top:8px;line-height:1.65}
.detail{margin-top:11px;padding-top:11px;border-top:1px solid var(--bd);display:none}
.card.open .detail{display:block}
.dlabel{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tm);margin-bottom:4px;font-weight:800}
.usecase{font-size:12px;color:var(--accent3);line-height:1.65;font-style:italic}
.chevron{color:var(--tm);flex-shrink:0;transition:transform .2s}
.empty{text-align:center;padding:50px 20px;color:var(--tm);grid-column:1/-1}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;background:var(--n7);border:1px solid var(--bd);border-radius:9px;padding:10px 14px;align-items:center}
.legend-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);font-weight:700;margin-right:4px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="logo-row">
    <div class="logo-icon">\ud83d\udcd6</div>
    <div class="logo-text">NonTechBook</div>
  </div>
  <h1>IT Vocab for <em style="color:#df7040;font-style:italic;font-weight:inherit">Non-Tech People</em></h1>
  <div style="font-size:13px;color:#7e96c2;margin-top:6px;font-style:italic">Bring peace to your tech journey.</div>
  <div class="stats-row" id="stats"></div>
</header>

<div class="legend">
  <span class="legend-title">Difficulty</span>
  <span class="leg-item"><span class="lbadge lv1b">Beginner</span> Everyday digital life</span>
  <span class="leg-item"><span class="lbadge lv2b">Workplace</span> Working with tech teams</span>
  <span class="leg-item"><span class="lbadge lv3b">Advanced</span> Deep technical discussions</span>
</div>

<div class="controls">
  <div class="sw">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search any term or definition\u2026">
  </div>
  <div class="lang-toggle">
    <button class="lang-btn on" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-th" onclick="setLang('th')">TH</button>
  </div>
</div>

<div class="filter-row">
  <span class="filter-label">Level</span>
  <button class="lvl-pill lvl-1 on" data-lv="1" onclick="toggleLv(1)">Beginner</button>
  <button class="lvl-pill lvl-2 on" data-lv="2" onclick="toggleLv(2)">Workplace</button>
  <button class="lvl-pill lvl-3 on" data-lv="3" onclick="toggleLv(3)">Advanced</button>
</div>

<div class="cat-bar" id="cat-bar"></div>
<div class="info-row" id="info-row"></div>
<div class="vocab-grid" id="grid"></div>
</div>


<script>
const CATS={
  "Internet":{color:"#6b9fff",e:"\ud83c\udf10"},"Security":{color:"#e06b6b",e:"\ud83d\udd12"},
  "Hardware":{color:"#f0a04b",e:"\ud83d\udcbb"},"Software":{color:"#9b7fff",e:"\u2699\ufe0f"},
  "Data & Storage":{color:"#3ecfc5",e:"\ud83d\udcbe"},"Network":{color:"#58d68d",e:"\ud83d\udce1"},
  "AI & Smart Tech":{color:"#e879f9",e:"\ud83e\udd16"},"Cloud":{color:"#38bdf8",e:"\u2601\ufe0f"},
  "Mobile":{color:"#fb923c",e:"\ud83d\udcf1"},"General Tech":{color:"#94a3b8",e:"\ud83d\udd27"},
  "API & Integrations":{color:"#facc15",e:"\ud83d\udd0c"},"Frontend & Backend":{color:"#a78bfa",e:"\ud83d\udda5\ufe0f"},
  "Architecture & Systems":{color:"#34d399",e:"\ud83c\udfd7\ufe0f"},"Databases & Queries":{color:"#f472b6",e:"\ud83d\uddc4\ufe0f"},
  "DevOps & Deployment":{color:"#60a5fa",e:"\ud83d\ude80"},"Agile & Dev Process":{color:"#fb923c",e:"\ud83d\udccb"}
};

const VOCAB=[
{t:"URL",d:"The web address of a page \u2014 like a postal address for the internet.",u:"The string 'https://www.google.com' in your browser bar is a URL.",c:"Internet",lv:1},
{t:"Browser",d:"The app used to visit websites. Chrome, Safari, Firefox, and Edge are browsers.",u:"Opening Chrome and navigating to a site uses a browser.",c:"Internet",lv:1},
{t:"Wi-Fi",d:"Wireless internet connection that lets devices go online without cables.",u:"Your phone uses Wi-Fi at home to avoid burning mobile data.",c:"Internet",lv:1},
{t:"VPN",d:"Virtual Private Network \u2014 hides your internet activity and secures your connection.",u:"Using hotel Wi-Fi safely is easier with a VPN active.",c:"Internet",lv:1},
{t:"Bandwidth",d:"How much data can flow through a connection at once \u2014 like the width of a pipe.",u:"Slow video calls happen when too many people share the same bandwidth.",c:"Internet",lv:1},
{t:"HTTP/HTTPS",d:"The language browsers use to talk to websites. HTTPS is the encrypted, secure version.",u:"A padlock icon in the address bar means the site uses HTTPS.",c:"Internet",lv:1},
{t:"ISP",d:"Internet Service Provider \u2014 the company that sells you internet access.",u:"True Move, AIS, and 3BB are ISPs in Thailand.",c:"Internet",lv:1},
{t:"Cache",d:"Saved copies of pages stored locally so they load faster next time.",u:"A page loading instantly on your second visit is thanks to cache.",c:"Internet",lv:1},
{t:"Cookie",d:"A small file a website stores on your device to remember login state or preferences.",u:"Staying logged in after closing a tab works because of cookies.",c:"Internet",lv:1},
{t:"Two-Factor Auth (2FA)",d:"A second verification step after your password \u2014 usually a code sent to your phone.",u:"After typing your password, a bank app may ask for a 6-digit SMS code.",c:"Security",lv:1},
{t:"Phishing",d:"A scam where attackers impersonate trusted companies to steal credentials or money.",u:"An email pretending to be your bank asking you to 'verify your account' is phishing.",c:"Security",lv:1},
{t:"Encryption",d:"Scrambling data so only intended recipients can read it \u2014 even if intercepted.",u:"WhatsApp messages are end-to-end encrypted so only sender and recipient see them.",c:"Security",lv:1},
{t:"Data Breach",d:"When private data is stolen or exposed from a company's system.",u:"If a service emails 'your data may have been compromised,' a breach likely occurred.",c:"Security",lv:1},
{t:"SSO (Single Sign-On)",d:"A system that lets you log into multiple apps with one set of credentials.",u:"'Log in with Google' on many websites uses SSO.",c:"Security",lv:2},
{t:"OAuth",d:"An open standard that lets apps request limited access to your account without seeing your password.",u:"Giving a scheduling app permission to read your Google Calendar uses OAuth.",c:"Security",lv:2},
{t:"Token",d:"A temporary digital key issued after login that proves your identity to a system.",u:"After logging in, your app stores a token so you don't re-enter your password on every request.",c:"Security",lv:2},
{t:"Penetration Testing",d:"Authorized hacking \u2014 security professionals try to break into a system to find weaknesses before attackers do.",u:"Before launching a banking app, a pen test is run to find vulnerabilities.",c:"Security",lv:3},
{t:"Zero-Day",d:"A security vulnerability that is unknown to the software vendor, giving them zero days to fix it.",u:"Attackers exploit zero-days before patches exist, making them extremely dangerous.",c:"Security",lv:3},
{t:"API",d:"Application Programming Interface \u2014 a defined way for two systems to talk to each other and exchange data.",u:"When a travel app shows live flight prices, it calls an airline's API to get them.",c:"API & Integrations",lv:2},
{t:"Endpoint",d:"A specific URL address where an API receives requests.",u:"'/api/users/123' is an endpoint that returns data about user 123.",c:"API & Integrations",lv:2},
{t:"Request / Response",d:"A request is asking an API for something; the response is what it sends back.",u:"Your app requests weather data; the weather API responds with temperature and forecast.",c:"API & Integrations",lv:2},
{t:"REST API",d:"The most common style of API \u2014 uses standard web methods (GET, POST, PUT, DELETE) to manage data.",u:"Almost every mobile app uses REST APIs to fetch and send data to a server.",c:"API & Integrations",lv:2},
{t:"GET / POST / PUT / DELETE",d:"Standard HTTP methods: GET = read data, POST = create, PUT = update, DELETE = remove.",u:"When you submit a form, the browser sends a POST request with your data.",c:"API & Integrations",lv:2},
{t:"JSON",d:"JavaScript Object Notation \u2014 a lightweight text format used to send structured data between systems.",u:"An API response with user details comes back as JSON: {\"name\":\"Ana\",\"age\":30}.",c:"API & Integrations",lv:2},
{t:"Webhook",d:"An automatic message sent by one system to another when a specific event happens.",u:"When a payment succeeds, a payment gateway sends a webhook to your server to update the order status.",c:"API & Integrations",lv:2},
{t:"API Key",d:"A unique code used to identify and authenticate who is making API calls.",u:"To use Google Maps in your app, you include an API key with every request.",c:"API & Integrations",lv:2},
{t:"Rate Limiting",d:"Restricting how many API calls a client can make in a set time window.",u:"A free API plan may allow only 100 requests per hour before blocking you.",c:"API & Integrations",lv:2},
{t:"Payload",d:"The actual data content carried inside a request or response.",u:"When you submit a form, the payload is all the field values sent to the server.",c:"API & Integrations",lv:2},
{t:"Authentication vs Authorization",d:"Authentication = proving who you are. Authorization = what you're allowed to do.",u:"Logging in is authentication; seeing only your own files (not others') is authorization.",c:"API & Integrations",lv:2},
{t:"GraphQL",d:"An alternative to REST that lets clients ask for exactly the data they need, nothing more.",u:"A mobile app uses GraphQL to fetch only a user's name and photo \u2014 not the full profile object.",c:"API & Integrations",lv:3},
{t:"SDK",d:"Software Development Kit \u2014 a package of tools and code that makes it easier to build with a specific platform.",u:"Using the Stripe SDK saves developers from writing payment code from scratch.",c:"API & Integrations",lv:3},
{t:"Frontend",d:"The part of a system that users see and interact with \u2014 the interface.",u:"The buttons, forms, and layout of a website are all frontend.",c:"Frontend & Backend",lv:2},
{t:"Backend",d:"The part of a system that users don't see \u2014 servers, databases, and business logic.",u:"When you log in, the backend checks your credentials and returns your data.",c:"Frontend & Backend",lv:2},
{t:"Full-Stack",d:"A developer or system that handles both frontend and backend.",u:"A full-stack developer can build the UI and the server logic for a feature.",c:"Frontend & Backend",lv:2},
{t:"UI (User Interface)",d:"Everything visual a user interacts with \u2014 buttons, screens, forms, menus.",u:"The design team creates UI mockups showing what each screen will look like.",c:"Frontend & Backend",lv:1},
{t:"UX (User Experience)",d:"How easy, intuitive, and enjoyable a product is to use \u2014 beyond just looks.",u:"If users keep clicking the wrong button, it's a UX problem, not just a design issue.",c:"Frontend & Backend",lv:2},
{t:"HTML",d:"The language that defines the structure and content of a webpage.",u:"The text, headings, and buttons on a page are written in HTML.",c:"Frontend & Backend",lv:2},
{t:"CSS",d:"The language that controls how a webpage looks \u2014 colors, fonts, layout.",u:"Making the 'Submit' button blue and rounded is done with CSS.",c:"Frontend & Backend",lv:2},
{t:"JavaScript",d:"The programming language that makes webpages interactive and dynamic.",u:"A form that validates your email before submitting uses JavaScript.",c:"Frontend & Backend",lv:2},
{t:"Framework",d:"A pre-built toolkit that gives developers a structured starting point for building software.",u:"React and Vue are frontend frameworks; Django and Laravel are backend frameworks.",c:"Frontend & Backend",lv:2},
{t:"Responsive Design",d:"A web design approach that makes a page look good on any screen size.",u:"A website that rearranges itself neatly on mobile is using responsive design.",c:"Frontend & Backend",lv:2},
{t:"Component",d:"A reusable, self-contained building block of a user interface.",u:"A 'Button' component can be used across 50 different screens without rewriting code.",c:"Frontend & Backend",lv:2},
{t:"Rendering",d:"The process of generating the visible output from code.",u:"Slow rendering means your page takes too long to display after the data arrives.",c:"Frontend & Backend",lv:3},
{t:"State",d:"The current snapshot of data in an application at any given moment.",u:"Whether a modal is open or closed, or what's in a shopping cart, is part of app state.",c:"Frontend & Backend",lv:3},
{t:"Architecture",d:"The high-level plan of how a system's components are structured and connected.",u:"Before building a new product, the tech lead presents an architecture diagram showing all the pieces.",c:"Architecture & Systems",lv:2},
{t:"Microservices",d:"Breaking a system into small, independent services that each handle one job.",u:"An e-commerce platform might have separate services for payments, inventory, and notifications.",c:"Architecture & Systems",lv:3},
{t:"Monolith",d:"A system where all functionality is bundled into one large, single application.",u:"A legacy banking system built as one giant app is a monolith.",c:"Architecture & Systems",lv:3},
{t:"Service",d:"A self-contained unit of functionality that performs a specific task.",u:"The email notification service sends emails; the payment service handles charges.",c:"Architecture & Systems",lv:2},
{t:"Load Balancer",d:"A component that distributes incoming requests across multiple servers to prevent overload.",u:"During a flash sale, a load balancer spreads traffic across 10 servers so none crashes.",c:"Architecture & Systems",lv:3},
{t:"Scalability",d:"How well a system handles growth \u2014 more users, more data, more load.",u:"If the app breaks when 10,000 users log in at once, it lacks scalability.",c:"Architecture & Systems",lv:2},
{t:"High Availability",d:"Designing a system to stay online even when parts of it fail.",u:"A 99.9% uptime SLA requires high availability architecture with no single point of failure.",c:"Architecture & Systems",lv:3},
{t:"Cache Layer",d:"A fast-access storage layer placed in front of a database to serve repeated requests quickly.",u:"Instead of hitting the database every time, product details are cached for 5 minutes.",c:"Architecture & Systems",lv:3},
{t:"Queue / Message Queue",d:"A buffer that stores tasks to be processed one by one, decoupling systems.",u:"Order emails are put in a queue so they send reliably even if the email service is slow.",c:"Architecture & Systems",lv:3},
{t:"Event-Driven",d:"An architecture where actions are triggered by events, not direct calls between services.",u:"When an order is placed (event), the inventory service and email service each react independently.",c:"Architecture & Systems",lv:3},
{t:"Latency",d:"The delay between an action and its result \u2014 measured in milliseconds.",u:"High latency makes the app feel sluggish \u2014 users wait too long for pages to respond.",c:"Architecture & Systems",lv:2},
{t:"Throughput",d:"How many operations a system can handle per unit of time.",u:"A payment system with high throughput can process thousands of transactions per second.",c:"Architecture & Systems",lv:3},
{t:"Redundancy",d:"Having backup systems or components so failure of one doesn't bring down everything.",u:"Storing data in two data centers is redundancy \u2014 if one fails, the other takes over.",c:"Architecture & Systems",lv:2},
{t:"Database",d:"An organized collection of data that can be stored, searched, and updated efficiently.",u:"Every time you search Amazon, it queries a massive database of products.",c:"Databases & Queries",lv:1},
{t:"SQL",d:"Structured Query Language \u2014 the standard language for talking to relational databases.",u:"The developer writes SQL to pull all orders placed in the last 30 days from the database.",c:"Databases & Queries",lv:2},
{t:"Query",d:"A question or request sent to a database to retrieve or manipulate data.",u:"'Show me all users who signed up this month' is a database query.",c:"Databases & Queries",lv:2},
{t:"Table",d:"Data organized in rows and columns inside a database \u2014 like a spreadsheet.",u:"A 'users' table might have columns for ID, name, email, and signup date.",c:"Databases & Queries",lv:2},
{t:"Primary Key",d:"A unique identifier for each row in a database table.",u:"Each customer has a unique customer_id that acts as their primary key.",c:"Databases & Queries",lv:2},
{t:"Foreign Key",d:"A field in one table that links to the primary key of another table, connecting related data.",u:"An 'orders' table has a customer_id foreign key linking each order to its customer.",c:"Databases & Queries",lv:2},
{t:"Schema",d:"The blueprint of a database \u2014 what tables exist, their columns, and data types.",u:"Before building a feature, the team designs a schema to plan what data is stored and how.",c:"Databases & Queries",lv:2},
{t:"Index",d:"A data structure that speeds up searches in a database, like a book's index.",u:"Adding an index on the 'email' column makes login queries much faster.",c:"Databases & Queries",lv:3},
{t:"NoSQL",d:"A category of databases that store data in flexible formats (documents, key-value pairs) instead of tables.",u:"MongoDB is a NoSQL database used when data structure varies per record.",c:"Databases & Queries",lv:3},
{t:"CRUD",d:"Create, Read, Update, Delete \u2014 the four basic operations for managing data.",u:"A to-do app lets you create tasks, read them, update their status, and delete them. That's CRUD.",c:"Databases & Queries",lv:2},
{t:"Migration",d:"A controlled, versioned change to the database schema.",u:"Adding a 'phone_number' column to the users table requires writing a migration.",c:"Databases & Queries",lv:2},
{t:"ORM",d:"Object Relational Mapper \u2014 a tool that lets developers work with databases using code instead of raw SQL.",u:"Using an ORM, a developer writes 'User.find(1)' instead of 'SELECT * FROM users WHERE id=1'.",c:"Databases & Queries",lv:3},
{t:"Transaction",d:"A sequence of database operations treated as a single unit \u2014 all succeed or all fail together.",u:"Transferring money deducts from one account and adds to another \u2014 both must succeed or neither happens.",c:"Databases & Queries",lv:3},
{t:"Deployment",d:"The process of releasing code changes to a live environment where users can access them.",u:"After the sprint ends, the team deploys the new feature to production.",c:"DevOps & Deployment",lv:2},
{t:"Environment",d:"A separate instance of the system \u2014 typically dev, staging, and production.",u:"Testing on staging before deploying to production prevents bugs from reaching users.",c:"DevOps & Deployment",lv:2},
{t:"Production",d:"The live system that real users are using right now.",u:"Never test untested features directly in production \u2014 bugs affect real customers.",c:"DevOps & Deployment",lv:2},
{t:"Staging",d:"A pre-production environment that mirrors production for final testing.",u:"QA tests the release on staging before it goes live.",c:"DevOps & Deployment",lv:2},
{t:"CI/CD",d:"Continuous Integration / Continuous Delivery \u2014 automating the process of testing and deploying code changes.",u:"With CI/CD, every code commit is automatically tested and deployed without manual steps.",c:"DevOps & Deployment",lv:3},
{t:"Pipeline",d:"An automated sequence of steps that code passes through \u2014 build, test, deploy.",u:"A pipeline runs unit tests, integration tests, then deploys if all pass.",c:"DevOps & Deployment",lv:3},
{t:"Container",d:"A lightweight, portable package that includes an app and everything it needs to run anywhere.",u:"Docker containers ensure the app runs the same on a developer's laptop as on the server.",c:"DevOps & Deployment",lv:3},
{t:"Docker",d:"The most popular tool for building and running containers.",u:"The team uses Docker so everyone develops in the same environment, avoiding 'it works on my machine.'",c:"DevOps & Deployment",lv:3},
{t:"Kubernetes (K8s)",d:"A system for automatically managing, scaling, and deploying containers at scale.",u:"Kubernetes automatically adds more containers during traffic spikes and removes them when traffic drops.",c:"DevOps & Deployment",lv:3},
{t:"Rollback",d:"Reverting to a previous version of the software when a release causes problems.",u:"After a bad deployment breaks checkout, the team triggers a rollback to restore the working version.",c:"DevOps & Deployment",lv:2},
{t:"Log",d:"A time-stamped record of events and errors in a running system.",u:"When users report an error, developers check logs to find what happened and when.",c:"DevOps & Deployment",lv:2},
{t:"Monitoring",d:"Continuously watching a system's health \u2014 errors, response times, resource usage.",u:"Monitoring alerts the on-call engineer if the error rate spikes above 1%.",c:"DevOps & Deployment",lv:2},
{t:"Downtime",d:"A period when a system is unavailable to users.",u:"Scheduled maintenance at 2am minimizes downtime impact on users.",c:"DevOps & Deployment",lv:2},
{t:"Hotfix",d:"An urgent, minimal patch deployed immediately to fix a critical bug in production.",u:"A payment bug blocking all checkouts triggers an emergency hotfix.",c:"DevOps & Deployment",lv:2},
{t:"Feature Flag",d:"A switch that turns a feature on or off without redeploying code.",u:"A new onboarding flow is deployed behind a feature flag and shown to only 10% of users first.",c:"DevOps & Deployment",lv:3},
{t:"Infrastructure",d:"The underlying hardware and software (servers, networks, storage) that applications run on.",u:"Moving infrastructure to AWS means you rent servers instead of buying them.",c:"DevOps & Deployment",lv:2},
{t:"Agile",d:"A flexible development approach that delivers software in small, frequent increments rather than one big release.",u:"Instead of a 12-month waterfall project, the team ships improvements every two weeks.",c:"Agile & Dev Process",lv:2},
{t:"Scrum",d:"A popular Agile framework using fixed-length sprints, daily standups, and defined roles.",u:"The team runs two-week Scrum sprints and demos completed features to stakeholders each Friday.",c:"Agile & Dev Process",lv:2},
{t:"Sprint",d:"A fixed time period (usually 1\u20132 weeks) during which the team completes a set of agreed work.",u:"This sprint's goal is to ship the user login feature and the password reset flow.",c:"Agile & Dev Process",lv:2},
{t:"Backlog",d:"The prioritized list of all work items \u2014 features, bugs, improvements \u2014 waiting to be done.",u:"The product backlog has 80 items; the PM decides which ones go into the next sprint.",c:"Agile & Dev Process",lv:2},
{t:"User Story",d:"A short, plain-language description of a feature from the user's perspective.",u:"'As a customer, I want to filter products by price so I can find affordable options.'",c:"Agile & Dev Process",lv:2},
{t:"Acceptance Criteria",d:"The specific conditions a feature must meet to be considered done \u2014 agreed before development starts.",u:"The acceptance criteria for login: user sees an error if the password is wrong; redirected to dashboard if correct.",c:"Agile & Dev Process",lv:2},
{t:"Definition of Done (DoD)",d:"The team's shared checklist of what 'finished' means \u2014 coded, tested, reviewed, deployed.",u:"A story isn't done until it passes code review, automated tests, and is deployed to staging.",c:"Agile & Dev Process",lv:2},
{t:"Standup",d:"A short daily meeting (usually 15 min) where each team member shares what they did, what they'll do, and any blockers.",u:"The 9am standup keeps the team aligned without long meetings.",c:"Agile & Dev Process",lv:2},
{t:"Retrospective",d:"A meeting at the end of each sprint to reflect on what went well, what didn't, and how to improve.",u:"In the retro, the team agrees to improve estimation because they over-committed last sprint.",c:"Agile & Dev Process",lv:2},
{t:"Sprint Review / Demo",d:"A meeting where the team shows completed work to stakeholders for feedback.",u:"The sprint review lets the product owner confirm the feature matches the original requirement.",c:"Agile & Dev Process",lv:2},
{t:"Epic",d:"A large body of work that is broken down into multiple user stories.",u:"'User Account Management' is an epic containing stories for signup, login, profile edit, and delete account.",c:"Agile & Dev Process",lv:2},
{t:"Ticket / Issue",d:"A tracked unit of work in a project management tool like Jira.",u:"Every bug or feature request is created as a Jira ticket with description, priority, and assignee.",c:"Agile & Dev Process",lv:2},
{t:"Story Points",d:"A relative unit used to estimate how complex or large a piece of work is.",u:"A simple bug fix might be 1 story point; a complex integration might be 13.",c:"Agile & Dev Process",lv:2},
{t:"Velocity",d:"The average number of story points a team completes per sprint \u2014 used for forecasting.",u:"With a velocity of 40 points per sprint, the team can estimate how long a 200-point backlog will take.",c:"Agile & Dev Process",lv:2},
{t:"Blocker",d:"An obstacle that stops a team member from completing their work.",u:"'I'm blocked because I'm waiting for the API documentation from the backend team.'",c:"Agile & Dev Process",lv:2},

{t:"MVP",d:"Minimum Viable Product \u2014 the simplest version of a product that delivers core value and can be released.",u:"The MVP has just login, search, and buy \u2014 no reviews, no wishlists. Ship first, add later.",c:"Agile & Dev Process",lv:2},
{t:"Technical Debt",d:"The future cost of quick shortcuts taken now \u2014 code written fast but not properly, which will need fixing later.",u:"Rushing a feature before launch creates technical debt that slows the team down for months.",c:"Agile & Dev Process",lv:2},
{t:"Refactoring",d:"Rewriting existing code to make it cleaner and more maintainable without changing its behavior.",u:"The team refactors the payment module so it's easier to add new payment methods later.",c:"Agile & Dev Process",lv:3},
{t:"Code Review",d:"The process where other developers read and check a colleague's code before it is merged.",u:"A code review catches a logic error before it reaches production.",c:"Agile & Dev Process",lv:2},
{t:"UAT (User Acceptance Testing)",d:"Testing done by business users or clients to confirm the system meets their requirements before go-live.",u:"The client's operations team runs UAT for two weeks and signs off before launch.",c:"Agile & Dev Process",lv:2},
{t:"Regression Testing",d:"Re-running tests to ensure new changes haven't broken existing functionality.",u:"After adding a new payment method, regression tests confirm the existing card payment still works.",c:"Agile & Dev Process",lv:2},
{t:"Test Case",d:"A documented scenario with inputs, steps, and expected results used to validate functionality.",u:"The tester writes: 'Enter invalid email \u2192 click submit \u2192 expect error message.'",c:"Agile & Dev Process",lv:2},
{t:"Bug Report",d:"A documented description of unexpected behavior \u2014 with steps to reproduce, expected vs. actual result.",u:"A good bug report lets developers reproduce the issue and fix it quickly.",c:"Agile & Dev Process",lv:2},
{t:"Release",d:"A versioned deployment of software made available to users.",u:"Version 2.3.0 is the release that includes the new dashboard and fixes three bugs.",c:"Agile & Dev Process",lv:2},
{t:"Stakeholder",d:"Anyone with an interest in the outcome of a project \u2014 users, business owners, executives, partners.",u:"The PM presents the sprint review to stakeholders so they can give feedback.",c:"Agile & Dev Process",lv:2},
{t:"Kanban",d:"An Agile approach that visualizes workflow on a board with columns like To Do, In Progress, Done.",u:"The team uses a Kanban board to see at a glance what everyone is working on.",c:"Agile & Dev Process",lv:2},

{t:"AWS / Azure / GCP",d:"The three dominant cloud providers \u2014 Amazon Web Services, Microsoft Azure, Google Cloud Platform.",u:"'We host on AWS' means the company rents servers from Amazon to run its system.",c:"Cloud",lv:2},

{t:"CDN",d:"Content Delivery Network \u2014 a network of servers worldwide that serves content from the closest location.",u:"A CDN serves images and videos from a server near each user, making load times faster.",c:"Cloud",lv:2},

{t:"Hardcoded",d:"Values written directly into the code rather than stored in a config or database.",u:"'The fee is hardcoded as 100 baht' means changing it requires a code release, not just a settings change.",c:"General Tech",lv:2},
{t:"Integration",d:"Connecting two or more systems so they can share data and work together.",u:"The CRM-to-ERP integration means a new sale in Salesforce automatically creates an invoice in SAP.",c:"General Tech",lv:2},
];


let activeLv=new Set([1,2,3]),activeCat='All',searchQ='',openTerm=null,lang='en';

function all(){return VOCAB;}

function filtered(){
  let v=all();
  v=v.filter(x=>activeLv.has(x.lv));
  if(activeCat!=='All')v=v.filter(x=>x.c===activeCat);
  if(searchQ){const q=searchQ.toLowerCase();v=v.filter(x=>x.t.toLowerCase().includes(q)||x.d.toLowerCase().includes(q));}
  return v;
}

function renderStats(){
  const v=all();
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${v.length}</div><div class="stat-l">Total Terms</div></div>
    <div class="stat"><div class="stat-n">${Object.keys(CATS).length}</div><div class="stat-l">Categories</div></div>
    <div class="stat"><div class="stat-n">${v.filter(x=>x.lv===1).length}</div><div class="stat-l">Beginner</div></div>
    <div class="stat"><div class="stat-n">${v.filter(x=>x.lv===2).length}</div><div class="stat-l">Workplace</div></div>
    <div class="stat"><div class="stat-n">${v.filter(x=>x.lv===3).length}</div><div class="stat-l">Advanced</div></div>
  `;
}

function renderCats(){
  const counts={};all().filter(x=>activeLv.has(x.lv)).forEach(x=>{counts[x.c]=(counts[x.c]||0)+1;});
  const total=all().filter(x=>activeLv.has(x.lv)).length;
  let h=`<button class="cat-pill on" style="background:${activeCat==='All'?'var(--accent-dim)':'transparent'};border-color:${activeCat==='All'?'var(--accent2)':'var(--bdl)'};color:${activeCat==='All'?'var(--accent)':'var(--tm)'}" onclick="setCat('All')">All (${total})</button>`;
  Object.entries(CATS).forEach(([n,m])=>{
    const cnt=counts[n]||0;if(!cnt)return;
    const on=activeCat===n;
    h+=`<button class="cat-pill${on?' on':''}" style="background:${on?m.color+'18':'transparent'};border-color:${on?m.color:'var(--bdl)'};color:${on?m.color:'var(--tm)'}" onclick="setCat('${n}')">${m.e} ${n} (${cnt})</button>`;
  });
  document.getElementById('cat-bar').innerHTML=h;
}

function lvLabel(lv){return lv===1?'<span class="lbadge lv1b">Beginner</span>':lv===2?'<span class="lbadge lv2b">Workplace</span>':'<span class="lbadge lv3b">Advanced</span>';}

function getDesc(item){return lang==='th'&&THAI[item.t]?THAI[item.t].d:item.d;}
function getUse(item){return lang==='th'&&THAI[item.t]?THAI[item.t].u||'':item.u||'';}

function setLang(l){
  lang=l;
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  document.getElementById('btn-th').classList.toggle('on',l==='th');
  renderGrid();
}

function renderGrid(){
  const v=filtered();
  document.getElementById('info-row').textContent=`Showing ${v.length} term${v.length!==1?'s':''}`;
  if(!v.length){
    document.getElementById('grid').innerHTML=`<div class="empty"><div style="font-size:32px;opacity:.25;margin-bottom:10px">\ud83d\udd0d</div><div style="color:var(--ts);font-size:14px">No terms match your filters.</div></div>`;
    return;
  }
  const thFont=lang==='th'?'font-family:"Segoe UI",Tahoma,sans-serif;line-height:1.8;':'';
  document.getElementById('grid').innerHTML=v.map(item=>{
    const cat=CATS[item.c]||{color:'#94a3b8'};
    const isOpen=openTerm===item.t;
    const desc=getDesc(item);
    const use=getUse(item);
    return `<div class="card${isOpen?' open':''}" data-term="${item.t.replace(/"/g,'&quot;')}" onclick="toggleCard(this.dataset.term)">
      <div class="ct">
        <div class="cdot" style="background:${cat.color}"></div>
        <div style="flex:1;min-width:0">
          <div class="term">${item.t}</div>
          <div class="ctag" style="color:${cat.color}">${(CATS[item.c]||{e:'\ud83d\udd27'}).e} ${item.c}</div>
          <div style="margin-top:4px">${lvLabel(item.lv)}</div>
        </div>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform:rotate(${isOpen?180:0}deg);margin-top:2px"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="def" style="${thFont}">${desc}</div>
      ${isOpen&&use?`<div class="detail"><div class="dlabel">\ud83d\udca1 Use Case</div><div class="usecase" style="${thFont}">${use}</div></div>`:''}
    </div>`;
  }).join('');
}

function toggleCard(term){openTerm=openTerm===term?null:term;renderGrid();}
function setCat(c){activeCat=c;openTerm=null;renderCats();renderGrid();}
function toggleLv(lv){
  if(activeLv.has(lv)){if(activeLv.size>1)activeLv.delete(lv);}else activeLv.add(lv);
  document.querySelectorAll('[data-lv]').forEach(b=>{b.classList.toggle('on',activeLv.has(parseInt(b.dataset.lv)));});
  openTerm=null;renderCats();renderGrid();
}

document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.trim();openTerm=null;renderGrid();});
renderStats();renderCats();renderGrid();
</script>
</body>
</html>
